name: staff_accommodation_app
description: "Staff Accommodation Management App — Automate room, bed, and staff tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase backend
  supabase_flutter: ^2.8.4

  # Navigation
  go_router: ^14.8.1

  # State management
  provider: ^6.1.5

  # Date formatting
  intl: ^0.20.2

  # Charts for dashboard
  fl_chart: ^0.70.2

  # Loading skeletons
  shimmer: ^3.0.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.5.1
  excel: ^4.0.6
  path_provider: ^2.1.6
  share_plus: ^13.2.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  universal_html: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
